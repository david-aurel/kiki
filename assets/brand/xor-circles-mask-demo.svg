<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="XOR-like overlap demo using mask">
  <style>
    .bg { fill: #fff; }
    .black { fill: #000; }
    .white { fill: #fff; }
    .label {
      font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #222;
    }
  </style>

  <defs>
    <circle id="leftCircle" cx="110" cy="88" r="48">
      <animate attributeName="cx" values="90;130;90" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle id="rightCircle" cx="210" cy="88" r="48">
      <animate attributeName="cx" values="230;190;230" dur="2.4s" repeatCount="indefinite" />
    </circle>

    <!-- Intersection mask: show left circle only where right circle exists -->
    <mask id="intersectionMask">
      <rect width="320" height="180" fill="black" />
      <use href="#rightCircle" fill="white" />
    </mask>
  </defs>

  <rect class="bg" width="320" height="180" />

  <!-- Base circles -->
  <use href="#leftCircle" class="black" />
  <use href="#rightCircle" class="black" />

  <!-- Overlap repainted white -->
  <use href="#leftCircle" class="white" mask="url(#intersectionMask)" />

  <text class="label" x="16" y="160">mask demo: circles black, overlap forced white (XOR-like result)</text>
</svg>

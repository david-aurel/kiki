    <!-- Bell center detail (second official path) -->
    <path id="bell-detail-path" d="M 1010.3 872.203 C 1031.1 871.652 1046.66 891.59 1033.7 910.743 C 1030.46 915.536 1023.42 915.127 1017.99 915.103 C 1009.51 915.085 1002.83 915.168 994.62 912.683 C 982.793 895.195 990.175 877.711 1010.3 872.203 z"/>

    <mask id="hat-cover-mask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2048" height="2048" fill="black"/>
      <g id="hat-mask-motion">
        <use href="#hat-path" fill="white"/>
        <animateTransform
          attributeName="transform"
          type="translate"
          from="420 -520"
          to="0 0"
          dur="1200ms"
          fill="freeze"
          begin="0s"
        />
      </g>
    </mask>
  </defs>

  <rect class="bg" x="0" y="0" width="2048" height="2048"/>

  <!-- Hat is behind the bell -->
  <g id="hat-visible-motion">
    <use href="#hat-path" class="ink"/>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="420 -520"
      to="0 0"
      dur="1200ms"
      fill="freeze"
      begin="0s"
    />
  </g>

  <!-- Bell starts black and stationary -->
  <use href="#bell-body-path" class="ink"/>
  <use href="#bell-detail-path" class="ink"/>

  <!-- XOR-like overlap color flip: repaint bell body white where hat covers it -->
  <use href="#bell-body-path" class="paper" mask="url(#hat-cover-mask)"/>
</svg>
